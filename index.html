<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T. Bastidas | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10;
            --card-bg: rgba(22, 27, 34, 0.7);
            --accent: #58a6ff;
            --text: #c9d1d9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(88, 166, 255, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(121, 40, 202, 0.05) 0%, transparent 20%);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        header {
            text-align: left;
            max-width: 1100px;
            margin: 0 auto 60px auto;
            border-left: 4px solid var(--accent);
            padding-left: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: -1px;
            color: #fff;
        }

        .subtitle {
            color: var(--accent);
            font-weight: 500;
            margin-top: 5px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .proyectos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 25px;
            max-width: 1100px;
            margin: auto;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 16px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card h3 {
            margin: 0 0 12px 0;
            font-size: 1.4rem;
        }

        .card h3 a {
            text-decoration: none;
            color: #fff;
        }

        .card p {
            color: #8b949e;
            font-size: 0.95rem;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .tag {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        #loading {
            text-align: center;
            grid-column: 1 / -1;
            padding: 50px;
            color: var(--accent);
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>T. Bastidas</h1>
        <div class="subtitle">Analista Programadora | Especialista en Soluciones TI</div>
    </header>

    <section id="contenedor-proyectos" class="proyectos">
        <div id="loading">Sincronizando con GitHub...</div>
    </section>

    <script>
        const username = 'B4st1d45';
        const apiUrl = `https://api.github.com/users/${username}/repos?sort=updated`;

        fetch(apiUrl)
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('contenedor-proyectos');
                container.innerHTML = '';
                
                // Filtramos para no mostrar repositorios vacíos o sin descripción
                const reposFiltrados = data.filter(repo => !repo.fork && repo.description);

                reposFiltrados.forEach(repo => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div>
                            <h3><a href="${repo.html_url}" target="_blank">${repo.name.replace(/-/g, ' ')}</a></h3>
                            <p>${repo.description}</p>
                        </div>
                        <div>
                            <span class="tag">${repo.language || 'Code'}</span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(err => console.error(err));
    </script>
</body>
</html>
